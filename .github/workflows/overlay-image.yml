name: overlay-image

# Build the cpa-login-hub CPA overlay image: CPA base + Python 3 + Camoufox
# + Playwright system libs + pre-warmed venv + pre-fetched Firefox binary.
# Publishes to ghcr.io/greensheep999/cpa-login-hub-overlay.
#
# Auth strategy — solves the "one GHCR host, two accounts" problem:
#   - PULL side (private base ghcr.io/daniellee2015/cli-proxy-api):
#       docker/login-action step 1 uses GHCR_PULL_TOKEN (daniellee2015 PAT
#       from repo secrets).
#   - PUSH side (ghcr.io/greensheep999/cpa-login-hub-overlay):
#       docker/login-action step 2 uses github.actor + secrets.GITHUB_TOKEN.
#       GITHUB_TOKEN is auto-provided by Actions and has packages:write
#       permission on THIS repo's owner namespace (greensheep999). No PAT
#       needed. The second login overwrites the first in docker config,
#       so the final `docker push` uses greensheep999 credentials — which
#       is exactly what we want.
#   - Buildx cache pull for the FROM base is done during the same job
#       as login step 1, before step 2 overwrites it (docker/login-action
#       and buildx share the same config layer within a job).
#
# Trigger: push to main / tags v* / manual workflow_dispatch.

on:
  push:
    branches: [main]
    tags: [v*]
    paths:
      - "docker/Dockerfile.overlay"
      - "docker/entrypoint-overlay.sh"
      - "worker/requirements.txt"
      - ".github/workflows/overlay-image.yml"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/cpa-login-hub-overlay
  BASE_IMAGE: ghcr.io/daniellee2015/cli-proxy-api:latest

jobs:
  build_arm64:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login (pull) — daniellee2015 PAT
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.GHCR_PULL_USER }}
          password: ${{ secrets.GHCR_PULL_TOKEN }}

      - name: Pre-pull base image with daniellee2015 creds
        # Cache the base image into buildx local store BEFORE we swap
        # docker config to the greensheep999 GITHUB_TOKEN. This way the
        # FROM directive in Dockerfile.overlay resolves from local cache
        # instead of re-hitting the registry after the login swap.
        run: |
          docker pull ${{ env.BASE_IMAGE }}
          docker image ls ${{ env.BASE_IMAGE }}

      - name: Login (push) — GITHUB_TOKEN
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase image name
        id: img
        run: echo "name=${IMAGE_NAME,,}" >> "$GITHUB_OUTPUT"

      - name: Build and push (arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.overlay
          platforms: linux/arm64
          push: true
          build-args: |
            BASE=${{ env.BASE_IMAGE }}
          tags: |
            ${{ env.REGISTRY }}/${{ steps.img.outputs.name }}:latest-arm64
            ${{ env.REGISTRY }}/${{ steps.img.outputs.name }}:${{ github.ref_name }}-arm64

  build_amd64:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login (pull) — daniellee2015 PAT
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.GHCR_PULL_USER }}
          password: ${{ secrets.GHCR_PULL_TOKEN }}

      - name: Pre-pull base image
        run: |
          docker pull ${{ env.BASE_IMAGE }}
          docker image ls ${{ env.BASE_IMAGE }}

      - name: Login (push) — GITHUB_TOKEN
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase image name
        id: img
        run: echo "name=${IMAGE_NAME,,}" >> "$GITHUB_OUTPUT"

      - name: Build and push (amd64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.overlay
          platforms: linux/amd64
          push: true
          build-args: |
            BASE=${{ env.BASE_IMAGE }}
          tags: |
            ${{ env.REGISTRY }}/${{ steps.img.outputs.name }}:latest-amd64
            ${{ env.REGISTRY }}/${{ steps.img.outputs.name }}:${{ github.ref_name }}-amd64

  manifest:
    runs-on: ubuntu-latest
    needs: [build_arm64, build_amd64]
    permissions:
      contents: read
      packages: write
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login — GITHUB_TOKEN
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase image name
        id: img
        run: echo "name=${IMAGE_NAME,,}" >> "$GITHUB_OUTPUT"

      - name: Create and push multi-arch manifest
        run: |
          IMAGE="${REGISTRY}/${{ steps.img.outputs.name }}"
          docker buildx imagetools create \
            --tag "${IMAGE}:latest" \
            "${IMAGE}:latest-arm64" \
            "${IMAGE}:latest-amd64"
          docker buildx imagetools create \
            --tag "${IMAGE}:${{ github.ref_name }}" \
            "${IMAGE}:${{ github.ref_name }}-arm64" \
            "${IMAGE}:${{ github.ref_name }}-amd64"
