name: overlay-image

# Build the cpa-login-hub CPA overlay image: CPA base + Python 3 + Camoufox
# + Playwright system libs + pre-warmed venv + pre-fetched Firefox binary.
# Pushes to GHCR under greenSheep999/cpa-login-hub-overlay.
#
# Trigger:
#   - push tags v* (release)
#   - push to main (rolling latest — safe because we don't force it into
#     any environment; production compose file references the concrete
#     :latest tag and only pulls on explicit compose pull)
#   - workflow_dispatch (manual)

on:
  push:
    branches: [main]
    tags: [v*]
    paths:
      # Rebuild when anything the image depends on changes.
      - "docker/Dockerfile.overlay"
      - "docker/entrypoint-overlay.sh"
      - "worker/requirements.txt"
      - ".github/workflows/overlay-image.yml"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  # Image name: greenSheep999/cpa-login-hub-overlay (namespace = repo owner).
  IMAGE_NAME: ${{ github.repository_owner }}/cpa-login-hub-overlay
  # The CPA base image we extend. Kept explicit so a version bump is a
  # single-line edit here rather than hidden in the Dockerfile.
  BASE_IMAGE: ghcr.io/daniellee2015/cli-proxy-api:latest

jobs:
  # We build arm64 and amd64 on native runners then stitch with a manifest.
  # arm64 native avoids QEMU emulation which is 5-10x slower for the
  # Camoufox fetch step (~700MB download + unzip).
  build_arm64:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          # daniellee2015 owns the CPA base image on GHCR; the workflow
          # runs under greenSheep999 (repo owner). Use a PAT stored as
          # a secret so we can pull the private base image AND push the
          # overlay under a namespace we own. GITHUB_TOKEN would only
          # let us push into greenSheep999's namespace, not pull the
          # private daniellee2015/cli-proxy-api base.
          username: ${{ secrets.GHCR_PULL_USER }}
          password: ${{ secrets.GHCR_PULL_TOKEN }}

      - name: Lowercase image name
        id: img
        run: echo "name=${IMAGE_NAME,,}" >> "$GITHUB_OUTPUT"

      - name: Build and push (arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.overlay
          platforms: linux/arm64
          push: true
          build-args: |
            BASE=${{ env.BASE_IMAGE }}
          tags: |
            ${{ env.REGISTRY }}/${{ steps.img.outputs.name }}:latest-arm64
            ${{ env.REGISTRY }}/${{ steps.img.outputs.name }}:${{ github.ref_name }}-arm64

  build_amd64:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.GHCR_PULL_USER }}
          password: ${{ secrets.GHCR_PULL_TOKEN }}

      - name: Lowercase image name
        id: img
        run: echo "name=${IMAGE_NAME,,}" >> "$GITHUB_OUTPUT"

      - name: Build and push (amd64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.overlay
          platforms: linux/amd64
          push: true
          build-args: |
            BASE=${{ env.BASE_IMAGE }}
          tags: |
            ${{ env.REGISTRY }}/${{ steps.img.outputs.name }}:latest-amd64
            ${{ env.REGISTRY }}/${{ steps.img.outputs.name }}:${{ github.ref_name }}-amd64

  manifest:
    runs-on: ubuntu-latest
    needs: [build_arm64, build_amd64]
    permissions:
      contents: read
      packages: write
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.GHCR_PULL_USER }}
          password: ${{ secrets.GHCR_PULL_TOKEN }}

      - name: Lowercase image name
        id: img
        run: echo "name=${IMAGE_NAME,,}" >> "$GITHUB_OUTPUT"

      - name: Create and push multi-arch manifest
        run: |
          IMAGE="${REGISTRY}/${{ steps.img.outputs.name }}"
          docker buildx imagetools create \
            --tag "${IMAGE}:latest" \
            "${IMAGE}:latest-arm64" \
            "${IMAGE}:latest-amd64"
          docker buildx imagetools create \
            --tag "${IMAGE}:${{ github.ref_name }}" \
            "${IMAGE}:${{ github.ref_name }}-arm64" \
            "${IMAGE}:${{ github.ref_name }}-amd64"
