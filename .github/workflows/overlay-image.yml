name: overlay-image

# Build the cpa-login-hub CPA overlay image: CPA base + Python 3 + Camoufox
# + Playwright system libs + pre-warmed venv + pre-fetched Firefox binary.
# Publishes to ghcr.io/greensheep999/cpa-login-hub-overlay.
#
# Two-token auth:
#   - GHCR_PULL_USER / GHCR_PULL_TOKEN  (daniellee2015 PAT)
#       Needed to pull the private base image
#       ghcr.io/daniellee2015/cli-proxy-api:latest during docker build.
#   - GHCR_PUSH_USER / GHCR_PUSH_TOKEN  (greenSheep999 PAT)
#       Used for the final `docker push` since the target image lives
#       in the greensheep999 namespace on GHCR.
#
# Trigger: push to main / tags v* / manual workflow_dispatch.

on:
  push:
    branches: [main]
    tags: [v*]
    paths:
      - "docker/Dockerfile.overlay"
      - "docker/entrypoint-overlay.sh"
      - "worker/requirements.txt"
      - ".github/workflows/overlay-image.yml"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/cpa-login-hub-overlay
  BASE_IMAGE: ghcr.io/daniellee2015/cli-proxy-api:latest

jobs:
  build_arm64:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Login #1: daniellee2015 — grants pull rights on the private base
      # image. buildx will use whichever creds satisfy the FROM directive.
      - name: Login (pull) — daniellee2015
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.GHCR_PULL_USER }}
          password: ${{ secrets.GHCR_PULL_TOKEN }}

      # Login #2: greenSheep999 — target namespace for push. docker
      # login stacks credentials per-registry in ~/.docker/config.json
      # keyed by registry hostname, so the SECOND login overwrites the
      # first for ghcr.io. Buildx still remembers the earlier session
      # for the FROM pull because it caches per-build-step. We keep the
      # push login last so `docker push` at the end of build-push-action
      # uses greenSheep999 creds.
      - name: Login (push) — greenSheep999
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.GHCR_PUSH_USER }}
          password: ${{ secrets.GHCR_PUSH_TOKEN }}

      - name: Lowercase image name
        id: img
        run: echo "name=${IMAGE_NAME,,}" >> "$GITHUB_OUTPUT"

      - name: Build and push (arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.overlay
          platforms: linux/arm64
          push: true
          build-args: |
            BASE=${{ env.BASE_IMAGE }}
          # Pass the pull-side credentials in via a secret so buildx can
          # authenticate the FROM instruction against the private base
          # image regardless of which login is "topmost" in the
          # docker config. See docker/build-push-action#623.
          secrets: |
            GIT_AUTH_TOKEN=${{ secrets.GHCR_PULL_TOKEN }}
          tags: |
            ${{ env.REGISTRY }}/${{ steps.img.outputs.name }}:latest-arm64
            ${{ env.REGISTRY }}/${{ steps.img.outputs.name }}:${{ github.ref_name }}-arm64

  build_amd64:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login (pull) — daniellee2015
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.GHCR_PULL_USER }}
          password: ${{ secrets.GHCR_PULL_TOKEN }}

      - name: Login (push) — greenSheep999
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.GHCR_PUSH_USER }}
          password: ${{ secrets.GHCR_PUSH_TOKEN }}

      - name: Lowercase image name
        id: img
        run: echo "name=${IMAGE_NAME,,}" >> "$GITHUB_OUTPUT"

      - name: Build and push (amd64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.overlay
          platforms: linux/amd64
          push: true
          build-args: |
            BASE=${{ env.BASE_IMAGE }}
          secrets: |
            GIT_AUTH_TOKEN=${{ secrets.GHCR_PULL_TOKEN }}
          tags: |
            ${{ env.REGISTRY }}/${{ steps.img.outputs.name }}:latest-amd64
            ${{ env.REGISTRY }}/${{ steps.img.outputs.name }}:${{ github.ref_name }}-amd64

  manifest:
    runs-on: ubuntu-latest
    needs: [build_arm64, build_amd64]
    permissions:
      contents: read
      packages: write
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Only need push credentials here — imagetools just tags remote refs.
      - name: Login — greenSheep999
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.GHCR_PUSH_USER }}
          password: ${{ secrets.GHCR_PUSH_TOKEN }}

      - name: Lowercase image name
        id: img
        run: echo "name=${IMAGE_NAME,,}" >> "$GITHUB_OUTPUT"

      - name: Create and push multi-arch manifest
        run: |
          IMAGE="${REGISTRY}/${{ steps.img.outputs.name }}"
          docker buildx imagetools create \
            --tag "${IMAGE}:latest" \
            "${IMAGE}:latest-arm64" \
            "${IMAGE}:latest-amd64"
          docker buildx imagetools create \
            --tag "${IMAGE}:${{ github.ref_name }}" \
            "${IMAGE}:${{ github.ref_name }}-arm64" \
            "${IMAGE}:${{ github.ref_name }}-amd64"
